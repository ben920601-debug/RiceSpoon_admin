<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飯匙雲端POS - 行動後台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* 📊 獨立後台專屬現代化排版優化 */
        body {
            background-color: #f4f1eb; /* 更柔和的後台專用越光米色 */
        }
        .dashboard-container {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
            box-sizing: border-box;
            height: calc(100vh - 60px);
        }
        /* 🏷️ 上方即時數據卡片 */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .kpi-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-sm);
        }
        .kpi-info h4 {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 5px;
            font-weight: 600;
        }
        .kpi-info .kpi-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text);
            font-family: monospace;
        }
        .kpi-icon {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }
        .icon-revenue { background: #fff1f2; color: var(--primary); }
        .icon-orders { background: #f0fdf4; color: #10b981; }
        .icon-staff { background: #eff6ff; color: #3b82f6; }

        /* 🗂️ 獨立功能區塊（控制分流） */
        .admin-box {
            background: white;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 25px;
            box-shadow: var(--shadow-md);
            margin-bottom: 25px;
        }
        .box-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }
        .box-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* 表格與表單精細調整 */
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        .admin-table th {
            background: #faf8f5;
            padding: 14px 12px;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 600;
            border-bottom: 2px solid var(--border);
        }
        .admin-table td {
            padding: 14px 12px;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }
        .scroll-wrapper {
            overflow-x: auto;
            width: 100%;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        
        /* 頁面標籤導覽列 (只在後台專用) */
        .admin-nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .tab-btn:hover {
            background: #fffdfa;
            color: var(--primary);
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-brand"><i class="fa-solid fa-chart-line"></i><span>飯匙POS行動後台</span></div>
        <ul class="sidebar-menu">
            <li class="sidebar-item active">
                <a href="dashboard.html"><i class="fa-solid fa-gauge"></i><span>管理區</span></a>
            </li>
        </ul>
        <div class="sidebar-footer">
            <span>v1.0 Admin</span>
            <span>電鍋工作室</span>
            <button class="btn-logout" onclick="handleLogout()" title="安全登出管理系統"><i class="fa-solid fa-right-from-bracket"></i></button>
        </div>
    </nav>

    <div class="main-wrapper">
        <header class="top-navbar" style="display: flex; justify-content: space-between; align-items: center; height: 60px; padding: 0 20px;">
            <div class="page-title">
                <h2><i class="fa-solid fa-sliders" style="color: var(--primary);"></i> 行動營運管理系統</h2>
            </div>

            <div class="marquee-wrapper">
                <div class="marquee-content" id="system-marquee">
                    <i class="fa-solid fa-shield-halved" style="color: var(--primary); margin-right: 6px;"></i> 
                    安全提示：目前已解鎖最高權限【店長後台模式】，異動將直接同步至雲端 Google 試算表。
                </div>
            </div>

            <div class="user-info">
                <button class="btn-refresh-trigger" onclick="refreshDashboardData()" title="手動同步全數據中心" style="background:none; border:none; color:var(--primary); cursor:pointer; font-size:1.1rem; padding:5px;"><i class="fa-solid fa-rotate"></i></button>
                <i class="fa-solid fa-user-shield" style="color: var(--primary); font-size: 1.2rem;"></i>
                <span id="cashier-name">管理者：連線中</span>
            </div>
        </header>

        <main class="dashboard-container">
            
            <div class="kpi-grid">
                <div class="kpi-card">
                    <div class="kpi-info">
                        <h4>今日營業總額</h4>
                        <div class="kpi-value" id="kpi-revenue">$0</div>
                    </div>
                    <div class="kpi-icon icon-revenue"><i class="fa-solid fa-wallet"></i></div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-info">
                        <h4>今日成交單數</h4>
                        <div class="kpi-value" id="kpi-orders">0 單</div>
                    </div>
                    <div class="kpi-icon icon-orders"><i class="fa-solid fa-receipt"></i></div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-info">
                        <h4>門市在職人數</h4>
                        <div class="kpi-value" id="kpi-staff">0 人</div>
                    </div>
                    <div class="kpi-icon icon-staff"><i class="fa-solid fa-user-tie"></i></div>
                </div>
            </div>

            <div class="admin-nav-tabs">
                <button class="tab-btn active" onclick="switchTab('tab-orders')"><i class="fa-solid fa-list-check"></i> 交易明細</button>
                <button class="tab-btn" onclick="switchTab('tab-products')"><i class="fa-solid fa-box"></i> 商品管理</button>
                <button class="tab-btn" onclick="switchTab('tab-staff')"><i class="fa-solid fa-users-gear"></i> 人事管理</button>
            </div>

            <div id="tab-orders" class="tab-content active">
                <div class="admin-box">
                    <div class="box-header">
                        <div class="box-title"><i class="fa-solid fa-receipt" style="color:var(--text-muted)"></i> 當日交易查詢</div>
                        <span style="font-size:0.85rem; color:var(--text-muted); background:#f3f4f6; padding:4px 12px; border-radius:20px;">即時倒序</span>
                    </div>
                    <div class="scroll-wrapper">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>交易時間 (TW)</th>
                                    <th>交易單號</th>
                                    <th>收銀員</th>
                                    <th>購買明細</th>
                                    <th style="text-align: right; padding-right: 20px;">交易總金額</th>
                                </tr>
                            </thead>
                            <tbody id="orders-table-body">
                                <tr><td colspan="5" style="text-align:center; color:var(--text-muted); padding:30px;"><i class="fa-solid fa-spinner fa-spin"></i> 正在連線雲端資料庫...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="tab-products" class="tab-content">
                <div class="admin-box" style="padding: 20px;">
                    <div class="box-title" style="margin-bottom:15px; font-size:1rem;"><i class="fa-solid fa-circle-plus" style="color:var(--primary)"></i> 快速上架新商品</div>
                    <form id="addProductForm" onsubmit="handleCreateProduct(event)" style="display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end;">
                        <div style="flex: 1; min-width: 200px;">
                            <input type="text" id="new-prod-name" placeholder="例如：焦糖拿鐵咖啡" required style="width:100%; padding:11px; border:1px solid var(--border); border-radius:6px; outline:none;">
                        </div>
                        <div style="width: 140px;">
                            <input type="number" id="new-prod-price" placeholder="單價 (TWD)" min="1" required style="width:100%; padding:11px; border:1px solid var(--border); border-radius:6px; outline:none;">
                        </div>
                        <button type="submit" id="add-product-btn" class="btn-save" style="padding: 11.5px 24px; border-radius: 6px; display: flex; align-items: center; gap: 6px;">
                            <i class="fa-solid fa-plus"></i> 加入商品
                        </button>
                    </form>
                </div>
                <div class="admin-box">
                    <div class="box-title" style="margin-bottom:15px;"><i class="fa-solid fa-table-list" style="color:var(--text-muted)"></i> 雲端同步品項</div>
                    <div class="scroll-wrapper">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th style="width: 15%;">商品 ID</th>
                                    <th style="width: 50%;">商品名稱</th>
                                    <th style="width: 20%;">價格</th>
                                    <th style="width: 15%; text-align: center;">操作</th>
                                </tr>
                            </thead>
                            <tbody id="manager-product-table">
                                <tr><td colspan="4" style="text-align:center; color:var(--text-muted); padding:30px;"><i class="fa-solid fa-spinner fa-spin"></i> 正在拉取雲端菜單...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="tab-staff" class="tab-content">
                <div class="admin-box">
                    <div class="box-header">
                        <div class="box-title"><i class="fa-solid fa-address-book" style="color:var(--text-muted)"></i> 門市人員編制</div>
                        <button class="btn-save" onclick="openAddModal()" style="padding: 8px 16px; border-radius: 6px;"><i class="fa-solid fa-user-plus"></i> 新增員工帳號</button>
                    </div>
                    <div class="scroll-wrapper">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>員工編號</th>
                                    <th>員工姓名</th>
                                    <th>職稱權限</th>
                                    <th>登入密碼</th>
                                    <th style="text-align: center;">操作</th>
                                </tr>
                            </thead>
                            <tbody id="staff-table-body">
                                <tr><td colspan="5" style="text-align:center; color:var(--text-muted); padding:30px;"><i class="fa-solid fa-spinner fa-spin"></i> 正在讀取雲端人事資料...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <div class="modal-overlay" id="addModal">
        <div class="modal-card">
            <div class="modal-header">
                <h3 id="modal-title"><i class="fa-solid fa-user-plus" style="color: var(--primary);"></i> 新增員工權限</h3>
                <button class="modal-close" onclick="closeAddModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="staffForm">
                <div class="input-group"><label>員工代碼/帳號</label><input type="text" id="staff-code" placeholder="例如: A01" required></div>
                <div class="input-group" style="margin-top: 15px;"><label>員工姓名</label><input type="text" id="staff-name" placeholder="例如: 王大明" required></div>
                <div class="input-group" style="margin-top: 15px;">
                    <label>職稱權限</label>
                    <select id="staff-role" required style="width:100%; padding:11px; border:1px solid var(--border); border-radius:6px;">
                        <option value="店員">店員</option><option value="店長">店長</option>
                    </select>
                </div>
                <div class="input-group" style="margin-top: 15px; margin-bottom: 25px;"><label>系統安全密碼</label><input type="text" id="staff-password" placeholder="請設定純數字登入密碼" required></div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" onclick="closeAddModal()">取消</button>
                    <button type="button" class="btn-save" id="staff-submit-btn" onclick="submitStaffFormAction()"><i class="fa-solid fa-check"></i> 確認</button>
                </div>
            </div>
        </div>
    </div>

    
    <script>
        // 1. 頁籤切換控制邏輯
        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.currentTarget.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        // 2. 聯動核心：拉取數據並動態加總頂部 KPI 看板金額
        function refreshDashboardData() {
            if(typeof window.handleManualRefresh === 'function') {
                window.handleManualRefresh();
            }
            calculateKpiSummary();
        }

        function calculateKpiSummary() {
            // 延遲等 fetch 完成後抓取本地暫存資料進行快速統計
            setTimeout(() => {
                // 統計成交單數與營業總額 (由 orders.js 加載至內部全域陣列)
                const tableRows = document.querySelectorAll("#orders-table-body tr");
                let totalRevenue = 0;
                let orderCount = 0;

                tableRows.forEach(row => {
                    const priceTd = row.querySelector("td:last-child");
                    if (priceTd && priceTd.innerText.includes("$")) {
                        const amt = parseInt(priceTd.innerText.replace("$", "")) || 0;
                        totalRevenue += amt;
                        orderCount++;
                    }
                });

                document.getElementById("kpi-revenue").innerText = `$${totalRevenue}`;
                document.getElementById("kpi-orders").innerText = `${orderCount} 單`;

                // 統計人事名冊人數
                const staffRows = document.querySelectorAll("#staff-table-body tr");
                let staffCount = 0;
                staffRows.forEach(row => {
                    if (row.querySelectorAll("td").length > 1) staffCount++;
                });
                document.getElementById("kpi-staff").innerText = `${staffCount} 人`;
            }, 1200);
        }

        // 當系統初始化完畢後自動觸發計算
        document.addEventListener("DOMContentLoaded", () => {
            // 主動向雲端拉取三大工作表
            if (typeof window.fetchCloudOrders === 'function') window.fetchCloudOrders();
            if (typeof window.fetchManagerProductsSelf === 'function') window.fetchManagerProductsSelf();
            if (typeof window.fetchCloudStaff === 'function') window.fetchCloudStaff();
            
            calculateKpiSummary();
        });
    </script>

    <script src="js/dashboard.js"></script>
</body>
</html>
